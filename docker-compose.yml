services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "6541:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 10

  stats-server:
    build: ./ewm-stats/ewm-stats-server
    container_name: stats-server
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      DB_HOST: stats-db
      DB_PORT: 5432
      DB_NAME: stats
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "9090:9090"
    restart: on-failure

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "6542:5432"

  ewm-service:
    build:
      context: .
      dockerfile: main-service/Dockerfile
    container_name: ewm-service
    depends_on:
      stats-server:
        condition: service_started
    environment:
      STATS_SERVER_URL: http://stats-server:9090
    ports:
      - "8080:8080"
